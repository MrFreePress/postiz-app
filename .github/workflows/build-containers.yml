---
name: "Build Containers"

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build-containers-common:
    runs-on: ubuntu-latest
    outputs:
      containerver: ${{ steps.getcontainerver.outputs.containerver }}
      image_repo: ${{ steps.getimagerepo.outputs.image_repo }}
    steps:
      - name: Get Container Version
        id: getcontainerver
        run: |
          echo "containerver=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Get Container Image Repository
        id: getimagerepo
        run: |
          OWNER_LOWER=$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "image_repo=ghcr.io/${OWNER_LOWER}/postiz-app" >> "$GITHUB_OUTPUT"

  build-containers:
    needs: build-containers-common
    strategy:
      matrix:
        include:
          - runnertags: ubuntu-latest
            arch: amd64
          - runnertags: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runnertags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Image
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
          IMAGE_REPO: ${{ needs.build-containers-common.outputs.image_repo }}
          NEXT_PUBLIC_VERSION: ${{ github.ref_name }}
        run: |
          docker buildx build --platform linux/${{ matrix.arch }} \
            -f Dockerfile.dev \
            -t ${{ env.IMAGE_REPO }}:${{ env.CONTAINERVER }}-${{ matrix.arch }} \
            --build-arg NEXT_PUBLIC_VERSION=${{ env.NEXT_PUBLIC_VERSION }} \
            --pull \
            --no-cache \
            --provenance=false --sbom=false \
            --output "type=registry,name=${{ env.IMAGE_REPO }}:${{ env.CONTAINERVER }}-${{ matrix.arch }}" .

  build-container-manifest:
    needs: [build-containers, build-containers-common]
    runs-on: ubuntu-latest
    steps:
      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create Docker Manifest
        env:
          CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
          IMAGE_REPO: ${{ needs.build-containers-common.outputs.image_repo }}
        run: |
          # Verify the architecture images
          echo "Verifying AMD64 image:"
          docker buildx imagetools inspect ${{ env.IMAGE_REPO }}:${{ env.CONTAINERVER }}-amd64
          
          echo "Verifying ARM64 image:"
          docker buildx imagetools inspect ${{ env.IMAGE_REPO }}:${{ env.CONTAINERVER }}-arm64
          
          # Try to remove any existing manifests first
          docker manifest rm ${{ env.IMAGE_REPO }}:${{ env.CONTAINERVER }} || true
          docker manifest rm ${{ env.IMAGE_REPO }}:latest || true
          
          # Create and push the version-specific manifest
          docker manifest create ${{ env.IMAGE_REPO }}:${{ env.CONTAINERVER }} \
            --amend ${{ env.IMAGE_REPO }}:${{ env.CONTAINERVER }}-amd64 \
            --amend ${{ env.IMAGE_REPO }}:${{ env.CONTAINERVER }}-arm64

          docker manifest push ${{ env.IMAGE_REPO }}:${{ env.CONTAINERVER }}

          # Create and push the latest manifest
          docker manifest create ${{ env.IMAGE_REPO }}:latest \
            --amend ${{ env.IMAGE_REPO }}:${{ env.CONTAINERVER }}-amd64 \
            --amend ${{ env.IMAGE_REPO }}:${{ env.CONTAINERVER }}-arm64

          docker manifest push ${{ env.IMAGE_REPO }}:latest

      - name: Verify Manifest
        run: |
          docker manifest inspect ${{ needs.build-containers-common.outputs.image_repo }}:latest
